# ============================================
# LOGSTASH SYSLOG PIPELINE CONFIGURATION
# ============================================

input {
  # Receive logs from Filebeat
  beats {
    port => 5044
    host => "0.0.0.0"
  }

  # Alternative: TCP input (port 5000) for manual testing
  tcp {
    port => 5000
    codec => "plain"
    tags => ["tcp_input"]
  }
}

filter {
  # Parse syslog messages for system logs
  if [fileset][module] == "system" {
    if [fileset][name] == "auth" {
      # Parse authentication logs
      grok {
        match => { 
          "message" => "%{SYSLOGBASE} %{DATA:auth_mechanism}(?:\[%{INT:pid}\])?: %{GREEDYDATA:auth_message}"
        }
      }

      # Identify failed logins
      if "Failed password" in [message] or "failure" in [message] {
        mutate {
          add_field => { "[@metadata][type]" => "failed_login" }
          add_tag => [ "failed_login", "security_event" ]
        }
      }

      # Identify successful logins
      if "Accepted" in [message] {
        mutate {
          add_field => { "[@metadata][type]" => "successful_login" }
          add_tag => [ "successful_login" ]
        }
      }

      # Extract username and IP address
      grok {
        match => { 
          "message" => "(?:Invalid user|Received disconnect from|Connection closed by|Invalid password for|Accepted %{WORD} for) %{DATA:username}"
        }
      }

      grok {
        match => { 
          "message" => "(?:from|for) %{IP:source_ip}"
        }
      }
    }
  }

  # Handle TCP input (for testing)
  if "tcp_input" in [tags] {
    grok {
      match => { 
        "message" => "%{SYSLOGBASE} %{GREEDYDATA:auth_message}"
      }
    }

    # Add fake tags for testing
    mutate {
      add_field => { "source_ip" => "192.168.1.100" }
      add_field => { "username" => "testuser" }
    }
  }

  # Add timestamp
  mutate {
    add_field => { "[@metadata][index_name]" => "logs-%{+YYYY.MM.dd}" }
  }

  # Remove unwanted fields to reduce storage
  mutate {
    remove_field => [ "agent.ephemeral_id", "agent.id", "agent.version", "input.type", "log.offset", "log.file.path" ]
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "changeme"
  }

  # Also print to console for debugging (comment out for production)
  stdout { 
    codec => json_lines
  }
}
